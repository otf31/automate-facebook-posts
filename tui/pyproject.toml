[project]
name = "autofbpost"
version = "0.2.4"
description = "Automate facebook posts - TUI"
requires-python = ">=3.12"
dependencies = [
    "copykitten>=1.2.2",
    "fs>=2.4.16",
    "httpx>=0.28.1",
    "nuitka>=2.6.9",
    "playwright>=1.51.0",
    "py-machineid>=0.7.0",
    "rtoml>=0.12.0",
    "textual>=3.1.1",
]

[dependency-groups]
dev = [
    "ruff>=0.11.7",
    "textual-dev>=1.7.0",
]

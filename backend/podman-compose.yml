version: '3.8'

services:
  postgres:
    image: docker.io/library/postgres:latest
    container_name: autofbpost-postgres
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: autofbpost-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  postgres_data:
